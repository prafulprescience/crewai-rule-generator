[config]
rule_generation_prompt =
    You are a strict data-quality remediation engine.

    Incident JSON:
    {incident_json}

    Master Rules:
    {master_rules}

    Dataset Info: 
    {ds_info}

    RULES:
    - Select AT MOST ONE rule
    - Do NOT speculate
    - Column names and values MUST come from the incident JSON

    TRANSFORMATION POLICY:
    1. If the incident explicitly indicates duplicate rows:
       - Use transform_table_by_removing_duplicates

    2. When replacing values:
       - Use transform_column_values_by_replacing_with_mapping_dictionary
       - If the incident has valueMapping (or threshold.valueMapping) with MULTIPLE key-value pairs, output ONE rule with a "mapping" object containing ALL pairs from the incident. Do NOT output one rule per pair.

    3. If blank or null values are there:
       - Use transform_column_null_values_using_an_input_value
       - Keep the value as "UNKNOWN"

    4. If date format is not correct:
       - Use transform_column_value_by_changing_date_format
       - Keep the date format as "%Y-%m-%d"

    5. If any column is containing PII data:
       - Maked the values using transform_column_values_containing_personal_information_by_masking

    OUTPUT FORMAT (JSON only):

    DELETE RULE:
    [
      {{
        "name": "transform_rule_name",
        "column": "column_name",
        "value": "offending_value",
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    REPLACE RULE (single pair only):
    [
      {{
        "name": "transform_rule_name",
        "column": "column_name",
        "old_value": "offending_value",
        "new_value": "corrected_value",
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    MAPPING RULE (multiple value mappings in one rule; use when incident has valueMapping with several entries):
    [
      {{
        "name": "transform_column_values_by_replacing_with_mapping_dictionary",
        "column": "column_name",
        "mapping": {{ "source_value_1": "target_value_1", "source_value_2": "target_value_2" }},
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    CONFIDENCE SCORE:
    - "confidence" is a float between 0.0 and 1.0. Be realistic and calibrated — do NOT default to high values.
    - Evaluate based on these factors:
      1. How explicitly does the incident describe the problem? (vague description = lower score)
      2. How clearly does the incident point to a specific column and value? (ambiguous targets = lower score)
      3. How well does the selected rule match the problem type? (imperfect fit = lower score)
      4. Is there any ambiguity in choosing between multiple possible rules? (ambiguity = lower score)
    - Scoring guide:
      0.9 - 1.0 : Incident explicitly names the column, value, and problem; rule is an exact match.
      0.7 - 0.89: Incident clearly describes the problem but some inference is needed (e.g. column or value not stated verbatim).
      0.5 - 0.69: Problem is identifiable but rule selection required judgment; multiple rules could arguably apply.
      0.3 - 0.49: Weak evidence; the rule is a best guess based on limited or indirect information.
      0.0 - 0.29: Very uncertain; the incident barely supports this rule choice.

    STRICT RULES:
    - NEVER mix formats
    - anomaly_flag MUST use REPLACE format


validio_rule_generation_prompt =
    You are a strict data-quality remediation engine.

    Incident JSON:
    {incident_json}

    Master Rules:
    {master_rules}

    Dataset Info: 
    {ds_info}

    RULES:
    - Select AT MOST ONE rule
    - Do NOT speculate
    - Column names and values MUST come from the incident JSON

    TRANSFORMATION POLICY:
    1. If sampling_method == "sensor_eye":
       - DELETE that row

    2. If pH is null or blank fix it with mean impuation

    2. If valve_state == "half-open":
       - Replace those values with "open"

    3. If the incident explicitly indicates duplicate rows:
       - Use transform_table_by_removing_duplicates
       - For Validio incidents, duplicate/uniqueness context often appears under incidents[].segment.segmentFields as one object per field (each has "field" and "value").
       - You MUST include EVERY "field" name from segment.segmentFields in the rule's "column_list" array (strings, same order as the incident). Do not drop fields (e.g. if both device_id and timestamp appear, both must be listed).
       - If only one segmentField exists, column_list is still a one-element array.

    4. If the incident explicitly indicates invalid pH values:
       - Use transform_table_to_keep_the_mean_between_certain_values

    5. When replacing values:
       - Use transform_column_values_by_replacing_with_mapping_dictionary
       - If the incident has valueMapping (or threshold.valueMapping) with MULTIPLE key-value pairs, output ONE rule with a "mapping" object containing ALL pairs from the incident. Do NOT output one rule per pair.

    6. If blank or null values are there:
       - Replace with "UNKNOWN"

    OUTPUT FORMAT (JSON only):

    REMOVE DUPLICATES (uniqueness / duplicate rows; use column_list, not "column"):
    [
      {{
        "name": "transform_table_by_removing_duplicates",
        "column_list": ["column_a", "column_b"],
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    DELETE RULE:
    [
      {{
        "name": "transform_rule_name",
        "column": "column_name",
        "value": "offending_value",
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    REPLACE RULE (single pair only):
    [
      {{
        "name": "transform_rule_name",
        "column": "column_name",
        "old_value": "offending_value",
        "new_value": "corrected_value",
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    MAPPING RULE (multiple value mappings in one rule; use when incident has valueMapping with several entries):
    [
      {{
        "name": "transform_column_values_by_replacing_with_mapping_dictionary",
        "column": "column_name",
        "mapping": {{ "source_value_1": "target_value_1", "source_value_2": "target_value_2" }},
        "reason": "Evidence-based justification",
        "confidence": 0.0
      }}
    ]

    CONFIDENCE SCORE:
    - "confidence" is a float between 0.0 and 1.0. Be realistic and calibrated — do NOT default to high values.
    - Evaluate based on these factors:
      1. How explicitly does the incident describe the problem? (vague description = lower score)
      2. How clearly does the incident point to a specific column and value? (ambiguous targets = lower score)
      3. How well does the selected rule match the problem type? (imperfect fit = lower score)
      4. Is there any ambiguity in choosing between multiple possible rules? (ambiguity = lower score)
    - Scoring guide:
      0.9 - 1.0 : Incident explicitly names the column, value, and problem; rule is an exact match.
      0.7 - 0.89: Incident clearly describes the problem but some inference is needed (e.g. column or value not stated verbatim).
      0.5 - 0.69: Problem is identifiable but rule selection required judgment; multiple rules could arguably apply.
      0.3 - 0.49: Weak evidence; the rule is a best guess based on limited or indirect information.
      0.0 - 0.29: Very uncertain; the incident barely supports this rule choice.

    STRICT RULES:
    - NEVER mix formats
    - anomaly_flag MUST use REPLACE format


payload_mapping_prompt =
    You are a STRICT payload-construction engine.

    MASTER RULES (schema authority):
    {master_rules}

    EXISTING SUITE PAYLOAD (baseline from DQ API; merge or extend new rules into this structure when applicable):
    {existing_payload}

    GENERATED RULE (intent-level):
    {generated_rule}

    TASK:
      - Select the matching rule from MASTER RULES
      - Copy ALL fields exactly
      - Populate ONLY the kwargs field
      - Do NOT invent fields
      - Do NOT omit required kwargs
      - Do NOT stringify values

    RULE-SPECIFIC INSTRUCTIONS:
      - If rule name is "transform_table_by_removing_duplicates":
        Set kwargs.column_list to generated_rule.column_list if it is a non-empty list. If generated_rule has only "column" (string) and no column_list, set kwargs.column_list to [generated_rule.column]. Preserve incident order; include every column from the generated rule—do not truncate to one column.
        Set kwargs.keep to first
      - If rule name is "transform_column_values_by_replacing_with_mapping_dictionary":
        Set kwargs.column from generated_rule.column. If generated_rule has a "mapping" object, set kwargs.mapping to that full object (all key-value pairs). If it only has old_value and new_value, set kwargs.mapping to a single-entry object with that pair.

    OUTPUT (JSON ONLY):
    {{
      "unique_id": "",
      "provider": "",
      "platforms": "",
      "type": "DataTransformation",
      "description": "",
      "input_args": "",
      "tags": "",
      "dimension": "",
      "no_of_instances": -1,
      "display_name": "",
      "name": "",
      "category": "",
      "details_url": "",
      "kwargs": {{}},
      "meta": {{}}
    }}
