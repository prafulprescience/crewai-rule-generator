analyze_dataset:
  description: |
    Analyze the provided data profile to identify quality issues and data characteristics.
    
    Dataset Profile: <<DS_INFO>>
    
    Additional Context: <<ADDITIONAL_INFO>>

    Master rules catalog (JSON):
    <<MASTER_RULES>>

    Analysis Tasks:
    1. Examine the data profile structure and column definitions
    2. Identify potential data quality issues based on the profile (null percentages, distributions, etc.)
    3. Determine which transformation rules could apply
    4. Prioritize issues by severity and impact
    
    Provide data-driven analysis based only on the profile information provided.
  expected_output: |
    A comprehensive data quality analysis containing:
    - Column-level statistics and characteristics
    - Identified quality issues and risk areas
    - Affected columns and their properties
    - Recommended transformation rules from master rules catalog
    - Confidence levels based on profile evidence

generate_rules:
  description: |
    Based on the data profile analysis, generate transformation rules to address identified quality issues.

    The rule generation policy below applies to each identified issue:
    <<RULE_PROMPT_TEMPLATE>>

    Guidelines:
    - Generate ONE rule per identified issue
    - Do NOT speculate beyond the profile evidence
    - Include realistic confidence scores (0.0-1.0)
    - Validate each rule against the master schema
    - Each rule must reference the specific data quality issue it addresses
  expected_output: |
    A JSON array of validated transformation rules with:
    - name: Rule name from master rules
    - column: The affected column(s)
    - parameters: Transformation parameters (value, mapping, or imputation method)
    - reason: Why this rule addresses the issue
    - confidence: Score (0.0-1.0) based on evidence strength
    - issue_reference: Which data profile issue this addresses

map_to_payload:
  description: |
    Transform each generated rule into the complete master rule format.

    MASTER RULES SCHEMA (reference template with all required fields):
    <<MASTER_RULES>>

    GENERATED RULES (from previous task):
    Use the rules from the generate_rules task output.

    INSTRUCTIONS FOR EACH GENERATED RULE:
    1. Find the matching rule template in master rules by rule name
    2. Copy ALL 15 schema fields from the master rule template
    3. Replace ONLY the 'kwargs' field with actual parameters from the generated rule
    4. Preserve all other fields (category, description, display_name, input_args, etc.)
    5. Generate a unique_id following pattern: dt-XXXX (where XXXX is sequential)
    6. Validate the transformed rule has all required keys present

    REQUIRED FIELDS (all 15 must be present):
    - unique_id, provider, platforms, type, description, input_args
    - tags, dimension, no_of_instances, display_name, name, category
    - details_url, kwargs (with actual values), meta

    Output format: A complete list of rule dictionaries, each containing all 15 keys
    and ready for API submission.

  expected_output: |
    A JSON array of complete rule objects (each with all 15 keys):
    [
      {
        "unique_id": "dt-XXXX",
        "provider": "Prescience",
        "platforms": "Pandas",
        "type": "DataTransformation",
        "description": "...",
        "input_args": "...",
        "tags": "",
        "dimension": "",
        "no_of_instances": -1,
        "display_name": "...",
        "name": "rule_name",
        "category": "Column_Level",
        "details_url": "",
        "kwargs": {actual values from generated rule},
        "meta": {}
      }
    ]

review_output:
  description: |
    Review all generated rules and the final payload for quality assurance.

    Perform these checks:
    1. Validate all rules against the master-rule schema and stated constraints
    2. Calculate the average confidence score from the generated rules
    3. Check for any inconsistencies or errors
    4. Determine if human review is required (confidence < 0.99)

    Provide a final summary with:
    - Total rules generated
    - Average AI confidence score
    - Any warnings or issues found
    - Recommendation: Auto-deploy or Human Review Required
  expected_output: |
    A quality assurance report containing:
    - total_rules: Number of rules generated
    - average_confidence: Float between 0.0 and 1.0
    - validation_passed: Boolean
    - issues: Array of any issues found
    - recommendation: 'auto_deploy' or 'human_review_required'
    - final_payload: The complete payload ready for API submission
