analyze_incidents:
  description: |
    Load and analyze all incidents from the '<<INCIDENT_TYPE>>' incidents directory.
    For each incident:
    1. Extract the incident details (type, title, affected columns, values)
    2. Identify the specific data quality issue
    3. Determine which transformation rule category applies
    4. Document the evidence from the incident JSON

    Dataset Info: <<DS_INFO>>

    Master rules catalog (JSON):
    <<MASTER_RULES>>

    Incidents bundle (all incident_*.json files for this run):
    <<INCIDENTS_JSON>>

    Analyze only the JSON above; map issues to rule names that exist in the master rules catalog.
  expected_output: |
    A detailed analysis report for each incident containing:
    - Incident file name and path
    - Issue type (null values, duplicates, format issues, etc.)
    - Affected column(s) and value(s)
    - Recommended transformation rule from master rules
    - Evidence excerpts from the incident JSON

generate_rules:
  description: |
    Based on the incident analysis, generate transformation rules for each incident.

    The policy block below already embeds the full incidents bundle, master rules catalog, and dataset info from this run.
    For each incident, apply this transformation policy:
    <<RULE_PROMPT_TEMPLATE>>

    IMPORTANT:
    - Generate AT MOST ONE rule per incident
    - Do NOT speculate - only use information from the incident
    - Include realistic confidence scores based on evidence quality
    - Check each generated rule against the master-rule schema and constraints before finalizing
    - Track overall confidence consistently across rules
  expected_output: |
    A JSON array of validated transformation rules, where each rule includes:
    - name: The transformation rule name from master rules
    - column or column_list: The affected column(s)
    - value/old_value/new_value/mapping: The transformation parameters
    - reason: Evidence-based justification
    - confidence: Float between 0.0 and 1.0
    - incident_name: Reference to the source incident

map_to_payload:
  description: |
    Transform each generated rule into the final DQ Suite payload format.

    Current suite payload from the API (baseline for merge / non-destructive updates):
    <<EXISTING_PAYLOAD>>

    Use this payload mapping template (includes master rules schema and where to take generated rules from):
    <<PAYLOAD_PROMPT_TEMPLATE>>

    For each rule:
    1. Find the matching rule in master rules by name
    2. Copy all schema fields from the master rule
    3. Populate the kwargs field with the generated rule parameters

    Output a single JSON object in your final answer only (no files, no multiple JSON blobs).
    The application will rebuild the official suite payload from intent rules; your task is analysis only.
  expected_output: |
    A concise JSON summary with key 'rules_summary' (array of rule names and columns) OR repeat the
    intent-level rules array if unchanged. Do NOT write to disk.

review_output:
  description: |
    Review all generated rules and the final payload for quality assurance.

    Perform these checks:
    1. Validate all rules against the master-rule schema and stated constraints
    2. Calculate the average confidence score from the generated rules
    3. Check for any inconsistencies or errors
    4. Determine if human review is required (confidence < 0.99)

    Provide a final summary with:
    - Total rules generated
    - Average AI confidence score
    - Any warnings or issues found
    - Recommendation: Auto-deploy or Human Review Required
  expected_output: |
    A quality assurance report containing:
    - total_rules: Number of rules generated
    - average_confidence: Float between 0.0 and 1.0
    - validation_passed: Boolean
    - issues: Array of any issues found
    - recommendation: 'auto_deploy' or 'human_review_required'
    - final_payload: The complete payload ready for API submission
